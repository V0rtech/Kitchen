<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Gallery</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;0,900;1,300;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --teal: #0F6E56;
      --teal-light: #13896B;
      --teal-dim: #0a4f3e;
      --teal-bg: #f0f9f6;
      --teal-faint: #e6f4f0;
      --accent: #E8F5F0;
      --gold: #C8922A;
      --warn: #D94F3B;
      --mid: #6B7A99;
      --text: #1A1E2E;
      --text-light: #4A5272;
      --border: #E2EAE7;
      --white: #FFFFFF;
      --card-shadow: 0 2px 16px rgba(15, 110, 86, 0.08);
      --card-shadow-hover: 0 8px 32px rgba(15, 110, 86, 0.16);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--teal-bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-link {
      color: var(--teal);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .page-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .page-body {
      padding: 28px 32px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .brand-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .brand-pill {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--teal);
      background: transparent;
      color: var(--teal);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .brand-pill:hover {
      background: var(--teal-faint);
    }

    .brand-pill.active {
      background: var(--teal);
      color: var(--white);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 14px 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--card-shadow);
    }

    .filter-group {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    .filter-btn.active {
      background: var(--teal);
      border-color: var(--teal);
      color: var(--white);
    }

    .sort-select {
      padding: 7px 14px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
    }

    .sort-select:focus {
      border-color: var(--teal);
    }

    .ad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 900px) {
      .ad-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .ad-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .ad-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      background: #111;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .ad-card:hover {
      transform: scale(1.02);
      box-shadow: var(--card-shadow-hover);
    }

    .ad-card img,
    .ad-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .status-badge.active {
      background: #2D9B6F;
      color: #fff;
    }

    .status-badge.inactive {
      background: rgba(107, 122, 153, 0.85);
      color: #fff;
    }

    .card-meta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 12px 10px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.72) 0%, transparent 100%);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.88);
      font-weight: 500;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.22);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .play-icon::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 8px 0 8px 16px;
      border-color: transparent transparent transparent rgba(255, 255, 255, 0.9);
      margin-left: 3px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 15px;
    }

    .ad-card-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--teal-faint);
      color: var(--mid);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      opacity: 0.55;
      pointer-events: none;
    }

    .ad-card-placeholder svg {
      width: 32px;
      height: 32px;
      opacity: 0.5;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 28px 0 8px;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 38px;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--teal);
      color: var(--teal);
    }

    .page-btn.active {
      background: var(--teal);
      border-color: var(--teal);
      color: var(--white);
    }

    .page-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .page-info {
      font-size: 13px;
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-inner img,
    .lightbox-inner video {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 10px;
      object-fit: contain;
      display: block;
    }

    .lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: rgba(255, 255, 255, 0.12);
      border: none;
      color: #fff;
      font-size: 24px;
      line-height: 1;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

<body>
  <header class="page-header">
    <a href="index.html" class="back-link">← Playbook</a>
    <h1 class="page-title">Campaign Gallery</h1>
  </header>

  <main class="page-body">
    <nav class="brand-selector" id="brandSelector" aria-label="Brand selector"></nav>

    <div class="filter-bar" id="filterBar">
      <div class="filter-group">
        <button type="button" class="filter-btn active" data-filter="media" data-value="images">Images</button>
        <button type="button" class="filter-btn" data-filter="media" data-value="videos">Videos</button>
      </div>
      <div class="filter-group">
        <button type="button" class="filter-btn active" data-filter="status" data-value="all">All</button>
        <button type="button" class="filter-btn" data-filter="status" data-value="active">Active</button>
        <button type="button" class="filter-btn" data-filter="status" data-value="inactive">Inactive</button>
      </div>
      <div class="filter-group">
        <select class="sort-select" id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="longest">Longest running</option>
          <option value="shortest">Shortest running</option>
        </select>
      </div>
    </div>

    <div class="ad-grid" id="adGrid"></div>
    <p class="empty-state" id="emptyState" style="display:none">No ads match the current filters.</p>
    <nav class="pagination" id="pagination" aria-label="Page navigation"></nav>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-inner" id="lightboxInner"></div>
    <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
  </div>

  <script>
    const R2_BASE = "https://pub-67f4bab315e9467d90ae1d113cac20f7.r2.dev";
    const PAGE_SIZE = 50;

    // Step 1: BRANDS constant and state object
    const BRANDS = [
      { name: 'Caraway', dir: 'caraway' },
      { name: 'Our Place', dir: 'our-place' },
      { name: 'HexClad', dir: 'hexclad' },
      { name: 'Made In', dir: 'made-in' },
      { name: 'Great Jones', dir: 'great-jones' },
      { name: 'Misen', dir: 'misen' },
      { name: 'Williams Sonoma', dir: 'williams-sonoma' },
      { name: 'Sur La Table', dir: 'sur-la-table' },
      { name: 'Lodge Cast Iron', dir: 'lodge' },
      { name: 'Wayfair', dir: 'wayfair' },
      { name: 'Crate and Barrel', dir: 'crate-barrel' },
      { name: 'OXO', dir: 'oxo' },
      { name: 'Food52', dir: 'food52' },
      { name: 'Bellroy', dir: 'bellroy' },
      { name: 'Allbirds', dir: 'allbirds' },
    ];

    let state = {
      brand: BRANDS[0],
      media: 'images',
      status: 'all',
      sort: 'newest',
    };

    // Step 2: loadBrand() function
    async function loadBrand(brand) {
      const media = state.media; // capture before await to avoid race on rapid toggle
      const file = media === 'videos' ? 'video_ads.json' : 'ads.json';
      const url = `campaigns/${brand.dir}/${file}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return [];
        return await res.json();
      } catch {
        return [];
      }
    }

    // Step 3: resolveActive() helper
    function resolveActive(ad) {
      if (ad.active === true) return true;
      if (ad.active === false) return false;
      const m = (ad.text || '').match(/\n(Active|Inactive)\n/);
      if (m) return m[1] === 'Active';
      return null;
    }

    // Step 4: parseDays() helper
    function parseDays(started) {
      if (!started) return null;
      const d = new Date(started);
      if (isNaN(d)) return null;
      return Math.floor((Date.now() - d) / 86_400_000);
    }

    function renderBrandSelector() {
      const nav = document.getElementById('brandSelector');
      nav.innerHTML = '';
      BRANDS.forEach(brand => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'brand-pill' + (brand === state.brand ? ' active' : '');
        btn.textContent = brand.name;
        btn.addEventListener('click', () => {
          state.brand = brand;
          renderBrandSelector();
          loadAndRender();
        });
        nav.appendChild(btn);
      });
    }

    const MIN_IMG_SIZE = 200; // px — anything smaller is an icon/thumbnail, not a real ad image

    function showPlaceholder(card) {
      // Clear existing img and overlays, replace with a muted placeholder
      card.innerHTML = '';
      card.classList.add('ad-card-placeholder');
      card.style.cursor = 'default';
      card.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 16l5-5 4 4 3-3 6 6"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
        </svg>
        <span>No preview</span>`;
    }

    function buildImageCard(ad) {
      const isActive = resolveActive(ad);
      const days = parseDays(ad.started);

      const adId = ad.id;
      const dir = state.brand.dir;

      const card = document.createElement('div');
      card.className = 'ad-card';

      // Only _2.jpg is saved by the scraper/uploaded to R2.
      // Omitting the plain .jpg R2 URL — it causes ERR_BLOCKED_BY_ORB
      // (browser blocks 404 HTML responses as images), stalling the fallback chain.
      const r2Src2    = R2_BASE ? `${R2_BASE}/campaigns/${dir}/images/${adId}_2.jpg` : null;
      const local2Src = `campaigns/${dir}/images/${adId}_2.jpg`;
      const cdnSrc    = (ad.images && ad.images[0]) || null;
      const srcs = [r2Src2, local2Src, cdnSrc].filter(Boolean);
      let srcIdx = 0;

      const img = document.createElement('img');
      img.alt = '';

      img.onload = function () {
        // Reject icon-sized images (thumbnails / 60×60 placeholders)
        if (img.naturalWidth < MIN_IMG_SIZE || img.naturalHeight < MIN_IMG_SIZE) {
          srcIdx++;
          if (srcIdx < srcs.length) {
            img.src = srcs[srcIdx]; // try next source
          } else {
            showPlaceholder(card);
          }
        }
      };

      img.onerror = function () {
        srcIdx++;
        if (srcIdx < srcs.length) {
          img.src = srcs[srcIdx];
        } else {
          showPlaceholder(card);
        }
      };

      img.src = srcs[srcIdx];
      card.appendChild(img);

      card.addEventListener('click', () => {
        if (card.classList.contains('ad-card-placeholder')) return;
        const expanded = document.createElement('img');
        expanded.src = img.src;
        expanded.alt = '';
        openLightbox(expanded);
      });

      appendCardOverlays(card, isActive, ad.started, days);
      return card;
    }

    function buildVideoCard(ad) {
      const isActive = resolveActive(ad);
      const days = parseDays(ad.started);
      const dir = state.brand.dir;
      const videoSrc = R2_BASE
        ? `${R2_BASE}/campaigns/${dir}/videos/${ad.id}.mp4`
        : `campaigns/${dir}/videos/${ad.id}.mp4`;

      const card = document.createElement('div');
      card.className = 'ad-card';

      const video = document.createElement('video');
      video.src = videoSrc;
      video.muted = true;
      video.playsInline = true;
      video.preload = 'metadata';
      video.addEventListener('error', () => card.remove());
      card.addEventListener('mouseenter', () => video.play().catch(() => { }));
      card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
      card.appendChild(video);

      const play = document.createElement('div');
      play.className = 'play-icon';
      card.appendChild(play);

      card.addEventListener('click', () => {
        const expanded = document.createElement('video');
        expanded.src = localSrc;
        expanded.controls = true;
        expanded.autoplay = true;
        expanded.muted = false;
        expanded.playsInline = true;
        openLightbox(expanded);
      });

      appendCardOverlays(card, isActive, ad.started, days);
      return card;
    }

    function appendCardOverlays(card, isActive, started, days) {
      if (isActive !== null) {
        const badge = document.createElement('span');
        badge.className = 'status-badge ' + (isActive ? 'active' : 'inactive');
        badge.textContent = isActive ? 'Active' : 'Inactive';
        card.appendChild(badge);
      }

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const dateSpan = document.createElement('span');
      dateSpan.textContent = started || '';
      meta.appendChild(dateSpan);

      if (isActive && days !== null) {
        const daysSpan = document.createElement('span');
        daysSpan.textContent = `${days} days live`;
        meta.appendChild(daysSpan);
      }

      card.appendChild(meta);
    }

    function applyFiltersAndSort(ads) {
      let out = ads.filter(ad => {
        if (state.status === 'all') return true;
        const a = resolveActive(ad);
        if (state.status === 'active') return a === true;
        if (state.status === 'inactive') return a === false;
        return true;
      });

      const getDays = ad => parseDays(ad.started);
      const isAct = ad => resolveActive(ad) === true;

      if (state.sort === 'newest') {
        out.sort((a, b) => (getDays(a) ?? Infinity) - (getDays(b) ?? Infinity));
      } else if (state.sort === 'oldest') {
        out.sort((a, b) => (getDays(b) ?? -Infinity) - (getDays(a) ?? -Infinity));
      } else if (state.sort === 'longest') {
        out.sort((a, b) => {
          const aAct = isAct(a), bAct = isAct(b);
          if (aAct !== bAct) return aAct ? -1 : 1;
          return (getDays(b) ?? -1) - (getDays(a) ?? -1);
        });
      } else if (state.sort === 'shortest') {
        out.sort((a, b) => {
          const aAct = isAct(a), bAct = isAct(b);
          if (aAct !== bAct) return aAct ? -1 : 1;
          return (getDays(a) ?? Infinity) - (getDays(b) ?? Infinity);
        });
      }

      return out;
    }

    function renderGrid(ads) {
      const grid = document.getElementById('adGrid');
      const empty = document.getElementById('emptyState');
      const filtered = applyFiltersAndSort(ads);

      grid.innerHTML = '';
      if (filtered.length === 0) {
        empty.style.display = 'block';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      empty.style.display = 'none';

      const start = (state.page - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      pageItems.forEach(ad => {
        const card = state.media === 'videos' ? buildVideoCard(ad) : buildImageCard(ad);
        grid.appendChild(card);
      });

      renderPagination(filtered.length, state.page, (newPage) => {
        state.page = newPage;
        renderGrid(ads);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    let _currentAds = [];
    let _renderGen = 0;

    async function loadAndRender() {
      const gen = ++_renderGen;
      const grid = document.getElementById('adGrid');
      grid.innerHTML = '<p class="loading-msg">Loading…</p>';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('pagination').innerHTML = '';
      const ads = await loadBrand(state.brand);
      if (gen !== _renderGen) return; // superseded by a later call
      _currentAds = ads;
      renderGrid(_currentAds, true);
    }

    function init() {
      renderBrandSelector();
      wireFilters();
      loadAndRender();
    }

    function wireFilters() {
      document.getElementById('filterBar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        const { filter, value } = btn.dataset;
        btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (filter !== 'media' && filter !== 'status') return;
        state[filter] = value;
        if (filter === 'media') {
          loadAndRender();
        } else {
          renderGrid(_currentAds, true);
        }
      });

      document.getElementById('sortSelect').addEventListener('change', e => {
        state.sort = e.target.value;
        renderGrid(_currentAds, true);
      });
    }

    // ── Lightbox ──────────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxInner = document.getElementById('lightboxInner');

    function openLightbox(el) {
      lightboxInner.innerHTML = '';
      lightboxInner.appendChild(el);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      // pause any video before removing
      const v = lightboxInner.querySelector('video');
      if (v) { v.pause(); v.currentTime = 0; }
      lightboxInner.innerHTML = '';
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    init();
  </script>
</body>

</html>
